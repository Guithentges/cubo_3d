<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cubo Mágico 3D</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }
  </style>
</head>

  <div id="controlesCubo">

  <button id="btnS">Superior (S)</button>
  <button id="btnI">Inferior (I)</button>

  <button id="btnF">Frontal (F)</button>
  <button id="btnT">Traseira (T)</button>

  <button id="btnE">Esquerda (E)</button>
  <button id="btnD">Direita (D)</button>

  </div>

  <button id="embaralhar">Embaralhar</button>

  <div id="contador">
    Movimentos: 0
  </div>

  <div id="mensagemEmbaralhando">
    EMBARALHANDO...
  </div>

  <div id="vitoria">
    CUBO RESOLVIDO!
  </div>

  <style>

    #controlesCubo {

    position: absolute;

    bottom: 20px;
    left: 20px;

    display: flex;
    gap: 10px;

    z-index: 1000;
  }

  #controlesCubo button {

    width: 200px;
    height: 50px;

    font-size: 20px;
    font-weight: bold;

    cursor: pointer;

    border: none;
    border-radius: 8px;

    background: white;
  }

  #controlesCubo button:hover {

    transform: scale(1.05);
  }

  #embaralhar {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 1000;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.5s ease;
  }
  #embaralhar:hover {
    background-color: #555;
    color: white;
    transition: all 0.5s ease;
  }

  #contador {
  position: absolute;
  top: 20px;
  right: 20px;

  color: white;
  font-size: 24px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  }

  #mensagemEmbaralhando {
  position: absolute;
  top: 70px;
  left: 20px;

  color: white;
  font-size: 16px;
  font-family: Arial, sans-serif;
  font-weight: bold;

  display: none;

  animation: piscar 2s infinite;
  }

  #vitoria {

  display: none;

  position: absolute;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  color: #00ff00;

  font-size: 48px;

  font-weight: bold;

  font-family: Arial;

  text-shadow:
    0 0 10px #00ff00,
    0 0 20px #00ff00;
}

  @keyframes piscar {

    0% {
      opacity: 1;
    }

    50% {
      opacity: 0;
    }

    100% {
      opacity: 1;
    }
  }
  </style>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

//Cena
const scene = new THREE.Scene();

scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(7, 7, 7);

function atualizarContador() {

  document.getElementById("contador")
    .textContent =
    `Movimentos: ${movimentos}`;
}

//Renderizador
const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

document.body.appendChild(renderer.domElement);


//Controles
const controls = new THREE.OrbitControls(
  camera,
  renderer.domElement
);

controls.enableDamping = true;

const light = new THREE.AmbientLight(
  0xffffff,
  1.5
);

scene.add(light);

document.getElementById("btnS")
.addEventListener("click", () => {
  girarFace("y", 1);
});

document.getElementById("btnI")
.addEventListener("click", () => {
  girarFace("y", -1);
});

document.getElementById("btnF")
.addEventListener("click", () => {
  girarFace("z", 1);
});

document.getElementById("btnT")
.addEventListener("click", () => {
  girarFace("z", -1);
});

document.getElementById("btnE")
.addEventListener("click", () => {
  girarFace("x", 1);
});

document.getElementById("btnD")
.addEventListener("click", () => {
  girarFace("x", -1);
});

//Função Cubinho
function criarCubo() {

  const materiais = [

    new THREE.MeshBasicMaterial({
      color: "#FFFFFF"
    }),

    new THREE.MeshBasicMaterial({
      color: "#FFD700"
    }),

    new THREE.MeshBasicMaterial({
      color: "#0045AD"
    }),

    new THREE.MeshBasicMaterial({
      color: "#009E0F"
    }),

    new THREE.MeshBasicMaterial({
      color: "#FF0000"
    }),

    new THREE.MeshBasicMaterial({
      color: "#FF5500"
    })

  ];

  const geometry = new THREE.BoxGeometry(
    0.95,
    0.95,
    0.95
  );

  return new THREE.Mesh(
    geometry,
    materiais
  );
}


//Criar 27 Cubos
const cubinhos = [];

for (let x = -1; x <= 1; x++) {

  for (let y = -1; y <= 1; y++) {

    for (let z = -1; z <= 1; z++) {

      const cubo = criarCubo();

      cubo.position.set(x, y, z);

      scene.add(cubo);

      cubinhos.push(cubo);
    }
  }
}

const estadoResolvido =
JSON.stringify(
  cubinhos.map(cubo => ({
    x: cubo.position.x,
    y: cubo.position.y,
    z: cubo.position.z,
    rx: cubo.rotation.x,
    ry: cubo.rotation.y,
    rz: cubo.rotation.z
  }))
);

function verificarVitoria() {

  const estadoAtual =
  JSON.stringify(
    cubinhos.map(cubo => ({
      x: cubo.position.x,
      y: cubo.position.y,
      z: cubo.position.z,
      rx: cubo.rotation.x,
      ry: cubo.rotation.y,
      rz: cubo.rotation.z
    }))
  );

  return estadoAtual === estadoResolvido;
}


//Grupo de Rotação
const grupoRotacao = new THREE.Group();

scene.add(grupoRotacao);


//Controle
let animando = false;

let anguloAtual = 0;

let eixoAtual = "y";

let camadaAtual = 1;

let movimentos = 0;

let embaralhando = false;


//Preparar Rotação Superior
function prepararRotacaoSuperior() {

  cubinhos.forEach(cube => {

    if (cube.position.y > 0.5) {

      grupoRotacao.add(cube);
    }
  });
}


//Preparar Rotação Frontal
function prepararRotacaoFrontal() {

  cubinhos.forEach(cube => {

    if (cube.position.z > 0.5) {

      grupoRotacao.add(cube);
    }
  });
}


//Nova função genérica
function prepararRotacao(eixo, camada) {

  cubinhos.forEach(cube => {

    if (Math.round(cube.position[eixo]) === camada) {

      grupoRotacao.add(cube);
    }
  });
}


//Girar Face Superior
function girarFaceSuperior() {

  if (animando) return;

  animando = true;

  anguloAtual = 0;

  eixoAtual = "y";

  prepararRotacaoSuperior();
}


//Girar Face Frontal
function girarFaceFrontal() {

  if (animando) return;

  animando = true;

  anguloAtual = 0;

  eixoAtual = "z";

  prepararRotacaoFrontal();
}


//Nova função genérica
function girarFace(eixo, camada) {

  if (animando) return;

  animando = true;

  anguloAtual = 0;

  eixoAtual = eixo;

  camadaAtual = camada;

  if (!embaralhando) {

  movimentos++;

  atualizarContador();
  }

  prepararRotacao(eixo, camada);
}


//Finalizar Rotação
function finalizarRotacao() {

  grupoRotacao.rotation[eixoAtual] =
    Math.PI / 2;

  grupoRotacao.updateMatrixWorld();

  while (grupoRotacao.children.length > 0) {

    const cubo = grupoRotacao.children[0];

    cubo.applyMatrix4(
      grupoRotacao.matrixWorld
    );

    grupoRotacao.remove(cubo);

    cubo.position.x =
      Math.round(cubo.position.x);

    cubo.position.y =
      Math.round(cubo.position.y);

    cubo.position.z =
      Math.round(cubo.position.z);

    cubo.rotation.x =
      Math.round(cubo.rotation.x / (Math.PI / 2))
      * (Math.PI / 2);

    cubo.rotation.y =
      Math.round(cubo.rotation.y / (Math.PI / 2))
      * (Math.PI / 2);

    cubo.rotation.z =
      Math.round(cubo.rotation.z / (Math.PI / 2))
      * (Math.PI / 2);

    scene.add(cubo);
  }
  if (!embaralhando && verificarVitoria()) {
    document.getElementById("vitoria")
      .style.display = "block";
  } else {
    document.getElementById("vitoria")
      .style.display = "none";
  }

  grupoRotacao.rotation.set(0, 0, 0);
}

function embaralhar() {

  embaralhando = true;

  document.getElementById("vitoria")
  .style.display = "none";

  const mensagem =
    document.getElementById(
      "mensagemEmbaralhando"
    );

  mensagem.style.display = "block";

  const movimentos = [

    () => girarFace("y", 1),
    () => girarFace("y", -1),

    () => girarFace("z", 1),
    () => girarFace("z", -1),

    () => girarFace("x", 1),
    () => girarFace("x", -1)

  ];

  let contador = 0;

  const intervalo = setInterval(() => {

    if (contador >= 15) {

      embaralhando = false;
      clearInterval(intervalo);
      mensagem.style.display = "none";

      return;
    }

    if (!animando) {

      const movimento =
        movimentos[
          Math.floor(
            Math.random() *
            movimentos.length
          )
        ];

      movimento();

      contador++;
    }

  }, 600);
}

document
  .getElementById("embaralhar")
  .addEventListener("click", embaralhar);

//Teclado
document.addEventListener("keydown", (e) => {

  switch (e.key.toLowerCase()) {

    case "s":
      girarFace("y", 1);
      break;

    case "i":
      girarFace("y", -1);
      break;

    case "f":
      girarFace("z", 1);
      break;

    case "t":
      girarFace("z", -1);
      break;

    case "e":
      girarFace("x", 1);
      break;

    case "d":
      girarFace("x", -1);
      break;
  }
});


//Resize
window.addEventListener("resize", () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});


//Animação
function animate() {

  requestAnimationFrame(animate);

  controls.update();

  if (animando) {

    grupoRotacao.rotation[eixoAtual] += 0.02;

    anguloAtual += 0.02;

    if (anguloAtual >= Math.PI / 2) {

      animando = false;

      finalizarRotacao();
    }
  }

  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
