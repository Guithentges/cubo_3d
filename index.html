<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cubo Mágico 3D</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }
  </style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

//Cena
const scene = new THREE.Scene();

scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(7, 7, 7);


//Renderizador
const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

document.body.appendChild(renderer.domElement);


//Controles
const controls = new THREE.OrbitControls(
  camera,
  renderer.domElement
);

controls.enableDamping = true;

const light = new THREE.AmbientLight(
  0xffffff,
  1.5
);

scene.add(light);


//Função Cubinho
function criarCubo() {

  const materiais = [

    new THREE.MeshBasicMaterial({
      color: "#FFFFFF"
    }),

    new THREE.MeshBasicMaterial({
      color: "#FFD700"
    }),

    new THREE.MeshBasicMaterial({
      color: "#0045AD"
    }),

    new THREE.MeshBasicMaterial({
      color: "#009E0F"
    }),

    new THREE.MeshBasicMaterial({
      color: "#FF0000"
    }),

    new THREE.MeshBasicMaterial({
      color: "#FF5500"
    })

  ];

  const geometry = new THREE.BoxGeometry(
    0.95,
    0.95,
    0.95
  );

  return new THREE.Mesh(
    geometry,
    materiais
  );
}


//Criar 27 Cubos
const cubinhos = [];

for (let x = -1; x <= 1; x++) {

  for (let y = -1; y <= 1; y++) {

    for (let z = -1; z <= 1; z++) {

      const cubo = criarCubo();

      cubo.position.set(x, y, z);

      scene.add(cubo);

      cubinhos.push(cubo);
    }
  }
}


//Grupo de Rotação
const grupoRotacao = new THREE.Group();

scene.add(grupoRotacao);


//Controle
let animando = false;

let anguloAtual = 0;

let eixoAtual = "y";

let camadaAtual = 1;


//Preparar Rotação Superior
function prepararRotacaoSuperior() {

  cubinhos.forEach(cube => {

    if (cube.position.y > 0.5) {

      grupoRotacao.add(cube);
    }
  });
}


//Preparar Rotação Frontal
function prepararRotacaoFrontal() {

  cubinhos.forEach(cube => {

    if (cube.position.z > 0.5) {

      grupoRotacao.add(cube);
    }
  });
}


//Nova função genérica
function prepararRotacao(eixo, camada) {

  cubinhos.forEach(cube => {

    if (Math.round(cube.position[eixo]) === camada) {

      grupoRotacao.add(cube);
    }
  });
}


//Girar Face Superior
function girarFaceSuperior() {

  if (animando) return;

  animando = true;

  anguloAtual = 0;

  eixoAtual = "y";

  prepararRotacaoSuperior();
}


//Girar Face Frontal
function girarFaceFrontal() {

  if (animando) return;

  animando = true;

  anguloAtual = 0;

  eixoAtual = "z";

  prepararRotacaoFrontal();
}


//Nova função genérica
function girarFace(eixo, camada) {

  if (animando) return;

  animando = true;

  anguloAtual = 0;

  eixoAtual = eixo;

  camadaAtual = camada;

  prepararRotacao(eixo, camada);
}


//Finalizar Rotação
function finalizarRotacao() {

  grupoRotacao.rotation[eixoAtual] =
    Math.PI / 2;

  grupoRotacao.updateMatrixWorld();

  while (grupoRotacao.children.length > 0) {

    const cubo = grupoRotacao.children[0];

    cubo.applyMatrix4(
      grupoRotacao.matrixWorld
    );

    grupoRotacao.remove(cubo);

    cubo.position.x =
      Math.round(cubo.position.x);

    cubo.position.y =
      Math.round(cubo.position.y);

    cubo.position.z =
      Math.round(cubo.position.z);

    cubo.rotation.x =
      Math.round(cubo.rotation.x / (Math.PI / 2))
      * (Math.PI / 2);

    cubo.rotation.y =
      Math.round(cubo.rotation.y / (Math.PI / 2))
      * (Math.PI / 2);

    cubo.rotation.z =
      Math.round(cubo.rotation.z / (Math.PI / 2))
      * (Math.PI / 2);

    scene.add(cubo);
  }

  grupoRotacao.rotation.set(0, 0, 0);
}


//Teclado
document.addEventListener("keydown", (e) => {

  switch (e.key.toLowerCase()) {

    case "s":
      girarFace("y", 1);
      break;

    case "i":
      girarFace("y", -1);
      break;

    case "f":
      girarFace("z", 1);
      break;

    case "t":
      girarFace("z", -1);
      break;

    case "e":
      girarFace("x", 1);
      break;

    case "d":
      girarFace("x", -1);
      break;
  }
});


//Resize
window.addEventListener("resize", () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});


//Animação
function animate() {

  requestAnimationFrame(animate);

  controls.update();

  if (animando) {

    grupoRotacao.rotation[eixoAtual] += 0.02;

    anguloAtual += 0.02;

    if (anguloAtual >= Math.PI / 2) {

      animando = false;

      finalizarRotacao();
    }
  }

  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
